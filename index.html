<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
<link rel="stylesheet" href="style.css">
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        purpleCustom: "#854dff",
                        offWhite: "#f0f0f0",
                        lightGrey: "#dbdbdb"
                    }
                }
            }
        }
    </script>

</head>


<body class="bg-offWhite flex justify-center items-center h-screen font-sans">
 <div 
    class="flex justify-center items-center w-[960px] h-[550px] p-16 rounded-1xl"
    style="box-shadow: 
        10px 0 15px -3px rgba(66, 64, 64, 0.3),   /* right */
        -10px 0 15px -3px rgba(92, 88, 88, 0.3),  /* left */
        0 8px 15px -5px rgba(143, 138, 138, 0.3);"   
>
 
  

 

    <div class="bg-white p-12 w-[500px] rounded-[20px_20px_100px_20px] shadow-lg">

        <!-- Inputs -->
        <div class="flex gap-5 mb-5">

    <!-- DAY -->
    <div>
        <label id="day-label"
            class="block text-[#716f6f] text-xs tracking-[2px] font-bold mb-1">
            DAY
        </label>

        <input type="number" id="day" placeholder="DD" min="1" max="31"
            class="w-20 p-2 text-xl font-extrabold border border-lightGrey rounded-md focus:outline-none focus:border-purpleCustom">

        <p class="text-red-500 text-xs mt-1 hidden" id="day-error">
            Must be valid day
        </p>
    </div>

    <!-- MONTH -->
    <div>
        <label id="month-label"
            class="block text-[#716f6f] text-xs tracking-[2px] font-bold mb-1">
            MONTH
        </label>

        <input type="number" id="month" placeholder="MM" min="1" max="12"
            class="w-20 p-2 text-xl font-extrabold border border-lightGrey rounded-md focus:outline-none focus:border-purpleCustom">

        <p class="text-red-500 text-xs mt-1 hidden" id="month-error">
            Must be valid month
        </p>
    </div>

    <!-- YEAR -->
    <div>
        <label id="year-label"
            class="block text-[#716f6f] text-xs tracking-[2px] font-bold mb-1">
            YEAR
        </label>

        <input type="number" id="year" placeholder="YYYY" min="1900" max="2025"
            class="w-20 p-2 text-xl font-extrabold border border-lightGrey rounded-md focus:outline-none focus:border-purpleCustom">
    </div>

</div>
        <!-- Line + Button -->
        <div class="relative flex items-center my-8">

            <!-- Line -->
            <div class="flex-grow border-t-2 border-lightGrey"></div>

            <!-- Button -->
            <button type="button" onclick="calculateAge()"
    class="absolute right-0 bg-purpleCustom hover:bg-purple-700 w-14 h-14 flex items-center justify-center rounded-full shadow-lg transition">
    <img src="assets/images/icon-arrow.svg" width="20">
</button>

        </div>

        <!-- Result -->
        <div class="mt-10 space-y-2">
            <div class="text-[50px] font-extrabold italic leading-tight">
                <span class="text-purpleCustom" id="out-years">--</span> years
            </div>
            <div class="text-[50px] font-extrabold italic leading-tight">
                <span class="text-purpleCustom" id="out-months">--</span> months
            </div>
            <div class="text-[50px] font-extrabold italic leading-tight">
                <span class="text-purpleCustom" id="out-days">--</span> days
            </div>
        </div>

    </div>
    </div> 
    <div class="absolute top-10 left-1/2 -translate-x-1/2 text-purple-300 text-6xl font-bold opacity-40">
    “”
</div>

  
<div class="absolute right-10 top-1/3 grid grid-cols-3 gap-2 opacity-40">
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
    <div class="w-3 h-3 bg-teal-300 rounded-full"></div>
</div>

  
<div class="absolute bottom-10 left-1/2 -translate-x-1/2 opacity-40">
    <div class="flex gap-2">
        <div class="w-4 h-1 bg-pink-300 rotate-45"></div>
        <div class="w-4 h-1 bg-pink-300 -rotate-45"></div>
        <div class="w-4 h-1 bg-pink-300 rotate-45"></div>
        <div class="w-4 h-1 bg-pink-300 -rotate-45"></div>
        <div class="w-4 h-1 bg-pink-300 rotate-45"></div>
    </div>
</div>

<script>
function calculateAge() {

    const dayInput = document.getElementById('day');
    const monthInput = document.getElementById('month');
    const yearInput = document.getElementById('year');

    const day = parseInt(dayInput.value);
    const month = parseInt(monthInput.value);
    const year = parseInt(yearInput.value);

    const dayError = document.getElementById('day-error');
    const monthError = document.getElementById('month-error');

    const dayLabel = document.getElementById('day-label');
    const monthLabel = document.getElementById('month-label');

    // RESET ERRORS
    dayError.classList.add("hidden");
    monthError.classList.add("hidden");

    dayInput.classList.remove("border-red-500");
    monthInput.classList.remove("border-red-500");

    dayLabel.classList.remove("text-red-500");
    monthLabel.classList.remove("text-red-500");

    let hasError = false;

    // VALIDATION
    if (isNaN(day) || day < 1 || day > 31) {
        dayError.classList.remove("hidden");
        dayInput.classList.add("border-red-500");
        dayLabel.classList.add("text-red-500");
        hasError = true;
    }

    if (isNaN(month) || month < 1 || month > 12) {
        monthError.classList.remove("hidden");
        monthInput.classList.add("border-red-500");
        monthLabel.classList.add("text-red-500");
        hasError = true;
    }

    const today = new Date();

    if (isNaN(year) || year > today.getFullYear()) {
        hasError = true;
        yearInput.classList.add("border-red-500");
    } else {
        yearInput.classList.remove("border-red-500");
    }

    if (hasError) return;

    // ==========================
    // AGE CALCULATION LOGIC
    // ==========================

    let birthDate = new Date(year, month - 1, day);

    let currentDate = new Date();

    let years = currentDate.getFullYear() - birthDate.getFullYear();
    let months = currentDate.getMonth() - birthDate.getMonth();
    let days = currentDate.getDate() - birthDate.getDate();

    if (days < 0) {
        months--;
        let prevMonth = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0);
        days += prevMonth.getDate();
    }

    if (months < 0) {
        years--;
        months += 12;
    }

    // OUTPUT UPDATE
    document.getElementById('out-years').innerHTML = years;
    document.getElementById('out-months').innerHTML = months;
    document.getElementById('out-days').innerHTML = days;
}
</script>
</body>
</html>
